<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,follow">
<meta http-equiv="refresh" content="0; url=../">
<title>BREVES — Redirecionando</title>
<script>
  (function () {
    var anchors = {
      '#frentes': '#atuacao',
      '#calculadora': '#diagnostico',
      '#agendar': '#contato'
    };
    var target = new URL('../', window.location.href);
    target.search = window.location.search;
    target.hash = anchors[window.location.hash] || window.location.hash;
    window.location.replace(target.href);
  }());
</script>
</head>
<body>
<p>Esta área agora faz parte do site principal da BREVES. <a href="../">Continuar</a>.</p>
</body>
</html>
